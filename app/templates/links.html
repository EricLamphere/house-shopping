{% extends "base.html" %}

{% block title %}Links — House Shopping{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Helpful Links</h1>

    <!-- Add link form -->
    <form
        hx-post="/links"
        hx-target="#link-list"
        hx-swap="outerHTML"
        hx-on::after-request="this.reset()"
        class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 mb-6 flex flex-col sm:flex-row gap-3 items-end">
        <div class="flex-1">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="link-text">Display text</label>
            <input
                id="link-text"
                name="text"
                type="text"
                required
                placeholder="e.g. Mortgage Calculator"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <div class="flex-1">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="link-url">URL</label>
            <input
                id="link-url"
                name="url"
                type="url"
                required
                placeholder="https://..."
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <button type="submit"
            class="shrink-0 inline-flex items-center px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
            <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add
        </button>
    </form>

    <!-- Link list -->
    {% include "partials/link_list.html" %}
</div>

<script>
(function () {
    function initSortable() {
        const list = document.getElementById('link-list');
        if (!list) return;
        Sortable.create(list, {
            handle: '.drag-handle',
            animation: 150,
            onEnd: function () {
                const ids = [...list.querySelectorAll('[data-id]')].map(el => el.dataset.id);
                fetch('/links/order', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ordered_ids: ids }),
                });
            },
        });
    }

    initSortable();

    // Re-init after HTMX swaps in new list (outerHTML swap replaces the element)
    document.body.addEventListener('htmx:afterSettle', function () {
        initSortable();
    });
})();
</script>
{% endblock %}
